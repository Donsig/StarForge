// ── Formatters ─────────────────────────────────────────────────────────────

function fmt(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1000) return Math.round(n / 1000) + 'K';
  return String(n);
}
function fmtTime(s) {
  if (!s || s < 60) return (s || 0) + 's';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m ${sec}s`;
}

// ── Shared sub-components ──────────────────────────────────────────────────

function TypeBadge({ type }) {
  const tc = TC[type];
  return (
    <span style={{
      fontFamily: "'Orbitron', sans-serif", fontSize: '0.6rem', fontWeight: 600,
      letterSpacing: '0.1em', textTransform: 'uppercase',
      color: tc.c, background: tc.bg, border: `1px solid ${tc.bd}`,
      borderRadius: 4, padding: '0.18rem 0.5rem',
      whiteSpace: 'nowrap',
    }}>{TL[type]}</span>
  );
}

function CostPills({ cost }) {
  const items = [
    cost.metal > 0     && { label: 'Metal',     val: fmt(cost.metal),     color: '#9ca3af' },
    cost.crystal > 0   && { label: 'Crystal',   val: fmt(cost.crystal),   color: '#60a5fa' },
    cost.deuterium > 0 && { label: 'Deut.',     val: fmt(cost.deuterium), color: '#34d399' },
  ].filter(Boolean);
  return (
    <div style={{ display: 'flex', gap: '0.35rem', flexWrap: 'wrap' }}>
      {items.map(p => (
        <span key={p.label} style={{
          fontFamily: "'JetBrains Mono', monospace", fontSize: '0.72rem',
          color: p.color, background: 'rgba(10,14,30,0.85)',
          border: '1px solid rgba(60,80,140,0.4)', borderRadius: 4,
          padding: '0.15rem 0.45rem',
        }}>{p.val}</span>
      ))}
    </div>
  );
}

function LevelTable({ rows, accentColor }) {
  // Detect which cost columns have any non-zero values
  const hasDeut   = rows.some(r => r.deuterium > 0);
  const hasEnergy = rows.some(r => r.energy !== 0);

  const colDefs = [
    { key: 'metal',     label: '⬡ Metal',  color: '#9ca3af' },
    { key: 'crystal',   label: '◈ Crystal', color: '#60a5fa' },
    ...(hasDeut   ? [{ key: 'deuterium', label: '◉ Deut.',  color: '#34d399' }] : []),
    ...(hasEnergy ? [{ key: 'energy',    label: '⚡ Energy', color: '#fbbf24' }] : []),
  ];

  const thBase = {
    fontSize: '0.57rem', fontWeight: 600, letterSpacing: '0.08em',
    textTransform: 'uppercase', padding: '0.3rem 0.5rem',
    background: 'rgba(5,8,20,0.7)',
    borderBottom: '1px solid rgba(40,60,120,0.28)',
    whiteSpace: 'nowrap',
  };

  return (
    <div style={{ borderRadius: 6, overflow: 'hidden', border: '1px solid rgba(40,60,120,0.28)' }}>
      <table style={{ width: '100%', borderCollapse: 'collapse', tableLayout: 'auto' }}>
        <thead>
          <tr>
            <th style={{ ...thBase, color: 'rgba(150,180,220,0.3)', textAlign: 'left', width: 80 }}>Level</th>
            <th style={{ ...thBase, color: 'rgba(150,180,220,0.3)', textAlign: 'left' }}>Benefit</th>
            {colDefs.map(c => (
              <th key={c.key} style={{ ...thBase, color: c.color, textAlign: 'right', opacity: 0.6 }}>{c.label}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => {
            const rowBg = r.current ? `${accentColor}1a`
                        : r.next    ? `${accentColor}0d`
                        : i % 2 === 0 ? 'rgba(5,8,20,0.28)' : 'transparent';
            const textAlpha = r.current ? '1' : r.next ? '0.82' : '0.42';
            const tdBase = {
              padding: '0.35rem 0.5rem',
              borderBottom: i < rows.length - 1 ? '1px solid rgba(40,60,120,0.14)' : 'none',
              background: rowBg,
            };
            return (
              <tr key={r.level}>
                <td style={{ ...tdBase }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '0.3rem' }}>
                    <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: '0.75rem', fontWeight: 700, color: r.current ? accentColor : r.next ? `${accentColor}cc` : `rgba(150,180,220,${textAlpha})` }}>
                      {r.level}
                    </span>
                    {r.current && (
                      <span style={{ fontSize: '0.52rem', background: accentColor, color: '#050810', borderRadius: 3, padding: '0.04rem 0.28rem', fontWeight: 800, letterSpacing: '0.05em' }}>NOW</span>
                    )}
                    {r.next && (
                      <span style={{ fontSize: '0.52rem', color: accentColor, border: `1px solid ${accentColor}88`, borderRadius: 3, padding: '0.04rem 0.28rem', fontWeight: 700, letterSpacing: '0.05em' }}>NEXT</span>
                    )}
                  </div>
                </td>
                <td style={{ ...tdBase, fontSize: '0.72rem', color: `rgba(200,224,255,${textAlpha})` }}>{r.benefit}</td>
                {colDefs.map(c => (
                  <td key={c.key} style={{ ...tdBase, fontFamily: "'JetBrains Mono',monospace", fontSize: '0.68rem', fontWeight: 600, color: c.color, opacity: r.current || r.next ? 1 : 0.45, textAlign: 'right', whiteSpace: 'nowrap' }}>
                    {r[c.key] === 0 ? <span style={{ color: 'rgba(150,180,220,0.2)' }}>—</span> : fmt(Math.abs(r[c.key]))}
                  </td>
                ))}
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function ReqPills({ requires, onNavigate }) {
  const [navigating, setNavigating] = useState(null);

  if (!requires || requires.length === 0) return (
    <span style={{ fontSize: '0.73rem', color: 'rgba(150,180,220,0.35)', fontStyle: 'italic' }}>No prerequisites</span>
  );

  function handleClick(r) {
    if (r.met) return;
    setNavigating(r.label);
    setTimeout(() => setNavigating(null), 1800);
    if (onNavigate) onNavigate(r);
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.4rem' }}>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.3rem' }}>
        {requires.map((r, i) => (
          <span
            key={i}
            onClick={() => handleClick(r)}
            title={r.met ? undefined : `Go to ${r.label}`}
            style={{
              fontSize: '0.7rem', padding: '0.17rem 0.5rem', borderRadius: 999,
              border: `1px solid ${r.met ? 'rgba(52,211,153,0.5)' : 'rgba(248,113,113,0.5)'}`,
              background: r.met ? 'rgba(52,211,153,0.08)' : 'rgba(248,113,113,0.08)',
              color: r.met ? '#34d399' : '#f87171',
              cursor: r.met ? 'default' : 'pointer',
              display: 'inline-flex', alignItems: 'center', gap: '0.3rem',
              transition: 'background 150ms, border-color 150ms',
              userSelect: 'none',
            }}
          >
            {r.label}
            {!r.met && (
              <span style={{ fontSize: '0.65rem', opacity: 0.7 }}>↗</span>
            )}
          </span>
        ))}
      </div>
      {navigating && (
        <div style={{
          fontSize: '0.7rem', color: '#f87171',
          display: 'flex', alignItems: 'center', gap: '0.35rem',
          padding: '0.3rem 0.55rem',
          background: 'rgba(248,113,113,0.08)',
          border: '1px solid rgba(248,113,113,0.25)',
          borderRadius: 6,
          animation: 'fadeIn 150ms ease',
        }}>
          <span style={{ opacity: 0.7 }}>↗</span>
          Navigating to <strong style={{ color: '#fca5a5' }}>{navigating}</strong>…
        </div>
      )}
      <style>{`@keyframes fadeIn { from { opacity:0; transform:translateY(-4px) } to { opacity:1; transform:translateY(0) } }`}</style>
    </div>
  );
}

function PrimaryBtn({ label, type }) {
  const tc = TC[type];
  return (
    <button style={{
      width: '100%', padding: '0.62rem 1rem',
      border: `1px solid ${tc.bd}`,
      borderRadius: 6,
      background: `linear-gradient(135deg, ${tc.bg.replace('0.12', '0.22')}, ${tc.bg.replace('0.12', '0.42')})`,
      color: tc.c,
      fontFamily: "'Orbitron', sans-serif", fontSize: '0.7rem',
      fontWeight: 600, letterSpacing: '0.09em', textTransform: 'uppercase',
      cursor: 'pointer',
    }}>{label}</button>
  );
}

function StatGrid({ stats }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.4rem' }}>
      {stats.map((s, i) => (
        <div key={i} style={{
          padding: '0.5rem 0.65rem',
          background: 'rgba(5,8,20,0.6)',
          border: '1px solid rgba(40,60,120,0.28)',
          borderRadius: 6,
        }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '0.88rem', fontWeight: 600, color: s.color }}>{s.value}</div>
          <div style={{ fontSize: '0.62rem', letterSpacing: '0.05em', textTransform: 'uppercase', color: 'rgba(150,180,220,0.38)', marginTop: '0.1rem' }}>{s.label}</div>
        </div>
      ))}
    </div>
  );
}

function SectionLabel({ children }) {
  return (
    <div style={{
      fontSize: '0.62rem', fontWeight: 600, textTransform: 'uppercase',
      letterSpacing: '0.1em', color: 'rgba(150,180,220,0.32)',
      marginBottom: '0.42rem',
    }}>{children}</div>
  );
}

function EnablesList({ items }) {
  if (!items || items.length === 0) return null;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.3rem' }}>
      {items.map((item, i) => (
        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', fontSize: '0.75rem', color: 'rgba(150,180,220,0.65)' }}>
          <span style={{ width: 6, height: 6, borderRadius: '50%', background: TC[item.type].c, flexShrink: 0, boxShadow: `0 0 5px ${TC[item.type].c}` }} />
          <TypeBadge type={item.type} />
          <span>{item.label}</span>
          <span style={{ marginLeft: 'auto', fontFamily: "'JetBrains Mono',monospace", fontSize: '0.65rem', color: 'rgba(150,180,220,0.35)' }}>at Lv {item.atLevel}</span>
        </div>
      ))}
    </div>
  );
}

function SummaryBox({ text, accentColor }) {
  return (
    <div style={{
      padding: '0.55rem 0.7rem',
      background: 'rgba(5,8,20,0.5)',
      border: `1px solid rgba(40,60,120,0.3)`,
      borderLeft: `3px solid ${accentColor}`,
      borderRadius: '0 6px 6px 0',
      fontSize: '0.76rem',
      color: 'rgba(150,180,220,0.62)',
      lineHeight: 1.5,
      fontStyle: 'italic',
    }}>{text}</div>
  );
}

// ── Dark space background ──────────────────────────────────────────────────

function GameBg({ children, blur }) {
  return (
    <div style={{
      width: '100%', height: '100%', position: 'relative', overflow: 'hidden',
      background: '#050810',
      backgroundImage: `
        radial-gradient(ellipse 60% 50% at 18% 22%, rgba(55,35,110,0.18) 0%, transparent 68%),
        radial-gradient(ellipse 50% 40% at 82% 72%, rgba(18,55,110,0.15) 0%, transparent 68%)
      `,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: "'Space Grotesk', sans-serif",
    }}>
      {blur && (
        <div style={{
          position: 'absolute', inset: 0,
          background: 'rgba(2,4,14,0.55)',
          backdropFilter: 'blur(4px)',
          zIndex: 1,
        }} />
      )}
      <div style={{ position: 'relative', zIndex: 2, width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {children}
      </div>
    </div>
  );
}

// PROPOSAL A ── DOSSIER
// Left: image + level + quick stats
// Right: name, description, full stats, prerequisites, cost + action
// ══════════════════════════════════════════════════════════════════════════

function NextLevelBox({ card, tc }) {
  const next = card.progression && card.progression.find(r => r.next);
  if (!next) return null;
  return (
    <div style={{
      padding: '0.65rem 0.8rem',
      background: `${tc.c}0f`,
      border: `1px solid ${tc.c}40`,
      borderRadius: 8,
      display: 'flex', flexDirection: 'column', gap: '0.4rem',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style={{ fontFamily: "'Orbitron',sans-serif", fontSize: '0.6rem', fontWeight: 700, color: tc.c, letterSpacing: '0.1em', textTransform: 'uppercase' }}>
          After Upgrade — Level {next.level}
        </span>

function QuantityStepper({ qty, setQty, cost, timeSeconds, type }) {
  const tc = TC[type];
  const totalCost = { metal: cost.metal * qty, crystal: cost.crystal * qty, deuterium: cost.deuterium * qty };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.45rem' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
        <span style={{ fontSize: '0.62rem', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'rgba(150,180,220,0.32)', flex: 1 }}>Quantity</span>
        <button onClick={() => setQty(q => Math.max(1, q - 1))} style={{ width: 26, height: 26, border: `1px solid ${tc.bd}`, borderRadius: 5, background: tc.bg, color: tc.c, cursor: 'pointer', fontSize: '1rem', lineHeight: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>−</button>
        <input
          type="number" min={1} value={qty}
          onChange={e => setQty(Math.max(1, parseInt(e.target.value) || 1))}
          style={{ width: 52, textAlign: 'center', fontFamily: "'JetBrains Mono',monospace", fontSize: '0.85rem', fontWeight: 600, color: '#c8e0ff', background: 'rgba(8,12,30,0.9)', border: `1px solid ${tc.bd}`, borderRadius: 5, padding: '0.25rem 0.3rem' }}
        />
        <button onClick={() => setQty(q => q + 1)} style={{ width: 26, height: 26, border: `1px solid ${tc.bd}`, borderRadius: 5, background: tc.bg, color: tc.c, cursor: 'pointer', fontSize: '1rem', lineHeight: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>+</button>
        <button onClick={() => setQty(10)} style={{ padding: '0.22rem 0.5rem', border: `1px solid rgba(60,80,120,0.35)`, borderRadius: 5, background: 'transparent', color: 'rgba(150,180,220,0.45)', cursor: 'pointer', fontSize: '0.65rem', letterSpacing: '0.05em' }}>MAX</button>

      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: '0.3rem' }}>

        {timeSeconds > 0 && <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: '0.65rem', color: 'rgba(150,180,220,0.3)' }}>{fmtTime(timeSeconds * qty)}</span>}
      </div>
    </div>
  );
}

        )}

        {/* scrollable body */}
        <div style={{ flex: 1, overflowY: 'auto', padding: '0.85rem 0.9rem', display: 'flex', flexDirection: 'column', gap: '0.8rem' }}>
          <p style={{ fontSize: '0.78rem', color: 'rgba(150,180,220,0.62)', lineHeight: 1.55, margin: 0 }}>{card.description}</p>

          {(card.type === 'building' || card.type === 'research') && (
            <div>
              <SectionLabel>{card.type === 'building' ? 'Output' : 'Effect'}</SectionLabel>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '0.28rem' }}>
                {card.stats.map((s, i) => (
                  <div key={i} style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '0.28rem 0',
                    borderBottom: i < card.stats.length - 1 ? '1px solid rgba(40,60,120,0.18)' : 'none',
                  }}>
                    <span style={{ fontSize: '0.7rem', textTransform: 'uppercase', letterSpacing: '0.05em', color: 'rgba(150,180,220,0.42)' }}>{s.label}</span>
                    <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: '0.8rem', fontWeight: 600, color: s.color }}>{s.value}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {card.progression && (
            <div>
              <SectionLabel>Level Progression</SectionLabel>
              <LevelTable rows={card.progression} accentColor={tc.c} />
            </div>
          )}

          {card.enables && card.enables.length > 0 && (
            <div>
              <SectionLabel>Unlocks</SectionLabel>
              <EnablesList items={card.enables} />
            </div>
          )}

          {card.requires.length > 0 && (
            <div>
              <SectionLabel>Prerequisites</SectionLabel>
              <ReqPills requires={card.requires} />
            </div>
          )}

          {card.summary && (
            <div>
              <SectionLabel>Strategic Notes</SectionLabel>
              <SummaryBox text={card.summary} accentColor={tc.c} />
            </div>
          )}
        </div>

        {/* footer */}
        <div style={{
          padding: '0.72rem 0.9rem 0.88rem',
          borderTop: '1px solid rgba(40,60,120,0.22)',
          background: 'rgba(5,8,20,0.5)',
          display: 'flex', flexDirection: 'column', gap: '0.48rem',
          flexShrink: 0,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <CostPills cost={card.cost} />
            <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: '0.67rem', color: 'rgba(150,180,220,0.32)' }}>{fmtTime(card.timeSeconds)}</span>
          </div>
          <PrimaryBtn label={card.actionLabel} type={card.type} />
        </div>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "cardType": "building"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const card = MOCK[tweaks.cardType] || MOCK.ship;

  return (
    <>
      <DesignCanvas>
        <DCSection id="proposals" title="Card Detail Modal — 3 Proposals · StarForge Issue #44">
          <DCArtboard id="dossier"     label="A — Dossier"      width={740} height={680}>
            <ProposalA card={card} />
          </DCArtboard>
          <DCArtboard id="holographic" label="B — Holographic"  width={620} height={560}>
            <ProposalB card={card} />
          </DCArtboard>
          <DCArtboard id="drawer"      label="C — Command Drawer" width={680} height={560}>
            <ProposalC card={card} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Card type">
          <TweakRadio
            value={tweaks.cardType}
            options={[
              { value: 'building', label: 'Building'  },
              { value: 'research', label: 'Research'  },
              { value: 'ship',     label: 'Ship'      },
              { value: 'defence',  label: 'Defence'   },
            ]}
            onChange={v => setTweak('cardType', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
